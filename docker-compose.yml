version: '3.8'
services:
  web1:
    build: .
    image: najeem08/flaskwebproject1:latest
    container_name: flaskapp1
    ports:
      - "8000:8000"
    environment:
      - SERVER_ID=1
      - SERVER_PORT=8000
    restart: always

  web2:
    build: .

    image: najeem08/flaskwebproject1:latest
    container_name: flaskapp2
    ports:
      - "8001:8000"
    environment:
      - SERVER_ID=2
      - SERVER_PORT=8000
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web1
      - web2
    restart: always